<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <style>
      .title { font: 700 26px 'Arial', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px 'Arial', sans-serif; fill: #334155; }
      .box-title { font: 700 14px 'Arial', sans-serif; fill: #0f172a; }
      .box-text { font: 500 12px 'Arial', sans-serif; fill: #334155; }
      .edge { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .edge-dashed { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .legend { font: 500 12px 'Arial', sans-serif; fill: #1e293b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="1080" fill="#f8fafc" />
  <text x="40" y="50" class="title">BareMgr 클래스 관계도</text>
  <text x="40" y="78" class="subtitle">핵심 컴포넌트 정적 의존/구성 관계</text>

  <!-- App Core -->
  <rect x="60" y="120" rx="14" ry="14" width="260" height="110" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="152" class="box-title">App</text>
  <text x="80" y="175" class="box-text">시스템 조립/생명주기</text>
  <text x="80" y="194" class="box-text">역할 전환/실행 진입점</text>

  <rect x="60" y="270" rx="12" ry="12" width="260" height="90" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="80" y="301" class="box-title">AppOrchestrator</text>
  <text x="80" y="324" class="box-text">processing/sync/etc 스케줄링</text>

  <rect x="60" y="395" rx="12" ry="12" width="260" height="90" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="426" class="box-title">FailoverNode (ABC)</text>
  <text x="80" y="449" class="box-text">리더 선출 + role 상태</text>

  <rect x="60" y="520" rx="12" ry="12" width="120" height="74" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="78" y="548" class="box-title">FailoverNode_zmq</text>
  <rect x="200" y="520" rx="12" ry="12" width="120" height="74" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="215" y="548" class="box-title">FailoverNode_db</text>

  <rect x="60" y="635" rx="12" ry="12" width="260" height="90" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="666" class="box-title">Replicator</text>
  <text x="80" y="689" class="box-text">Active: publish / Standby: subscribe</text>

  <rect x="60" y="760" rx="12" ry="12" width="260" height="90" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="791" class="box-title">Store</text>
  <text x="80" y="814" class="box-text">SQLite 테이블별 저장소</text>

  <rect x="60" y="885" rx="12" ry="12" width="260" height="90" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="916" class="box-title">Logger</text>
  <text x="80" y="939" class="box-text">Queue 기반 멀티스레드/프로세스 로깅</text>

  <!-- Collectors -->
  <rect x="420" y="120" rx="12" ry="12" width="270" height="90" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="440" y="151" class="box-title">BaseCollector (ABC)</text>
  <text x="440" y="174" class="box-text">주기 루프 + active 제어</text>

  <rect x="420" y="240" rx="12" ry="12" width="270" height="95" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="440" y="271" class="box-title">OracleCollector</text>
  <text x="440" y="294" class="box-text">Oracle query 수집</text>
  <text x="440" y="313" class="box-text">OracleConnectionManager 사용</text>

  <rect x="420" y="365" rx="12" ry="12" width="270" height="95" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="440" y="396" class="box-title">SplunkCollector</text>
  <text x="440" y="419" class="box-text">SplunkSearch/query 수집</text>

  <rect x="420" y="490" rx="12" ry="12" width="270" height="95" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="440" y="521" class="box-title">SplunkSearch (함수 모듈)</text>
  <text x="440" y="544" class="box-text">BASE_URL/CREDENTIAL_KEY/TOKEN</text>

  <!-- Pipeline -->
  <rect x="780" y="120" rx="12" ry="12" width="310" height="110" fill="#f5d0fe" stroke="#a21caf" stroke-width="2"/>
  <text x="800" y="151" class="box-title">ProcessingPipeline</text>
  <text x="800" y="174" class="box-text">main job queue + worker 처리</text>
  <text x="800" y="193" class="box-text">source/current oracle + output fanout</text>

  <rect x="780" y="260" rx="12" ry="12" width="150" height="82" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="798" y="290" class="box-title">OracleSessionPool</text>
  <rect x="940" y="260" rx="12" ry="12" width="150" height="82" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="966" y="290" class="box-title">OracleResultWriter</text>

  <rect x="780" y="370" rx="12" ry="12" width="150" height="82" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="806" y="400" class="box-title">ObjectResultLogger</text>
  <rect x="940" y="370" rx="12" ry="12" width="150" height="82" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="984" y="400" class="box-title">DroneClient</text>

  <rect x="780" y="490" rx="12" ry="12" width="310" height="95" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="800" y="521" class="box-title">SyncJobManager / SyncOracleToOracle</text>
  <text x="800" y="544" class="box-text">source→target Oracle sync + checkpoint</text>

  <rect x="780" y="615" rx="12" ry="12" width="310" height="95" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="800" y="646" class="box-title">EtcManager</text>
  <text x="800" y="669" class="box-text">heartbeat/purge/oracle_probe task</text>

  <!-- Shared Infra -->
  <rect x="1180" y="120" rx="12" ry="12" width="340" height="95" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="1200" y="151" class="box-title">OracleConnectionManager</text>
  <text x="1200" y="174" class="box-text">DSN별 연결 재사용 + close_all</text>

  <rect x="1180" y="245" rx="12" ry="12" width="340" height="95" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="1200" y="276" class="box-title">oracle_driver / oracle_utils</text>
  <text x="1200" y="299" class="box-text">get_cx_oracle, init_oracle_client, makeDictFactory</text>

  <!-- Edges -->
  <path class="edge" d="M320 170 L420 165"/>
  <path class="edge" d="M320 310 L420 310"/>
  <path class="edge" d="M320 435 L420 435"/>
  <path class="edge" d="M320 680 L420 180"/>
  <path class="edge" d="M320 805 L420 180"/>
  <path class="edge" d="M320 930 L420 180"/>

  <path class="edge-dashed" d="M555 210 L555 240"/>
  <path class="edge-dashed" d="M555 210 L555 365"/>
  <path class="edge" d="M555 460 L555 490"/>

  <path class="edge" d="M690 170 L780 170"/>
  <path class="edge" d="M320 305 L780 535"/>
  <path class="edge" d="M320 305 L780 662"/>

  <path class="edge-dashed" d="M935 230 L855 260"/>
  <path class="edge-dashed" d="M935 230 L1015 260"/>
  <path class="edge-dashed" d="M935 230 L855 370"/>
  <path class="edge-dashed" d="M935 230 L1015 370"/>

  <path class="edge" d="M690 287 L1180 167"/>
  <path class="edge" d="M1090 662 L1180 167"/>
  <path class="edge" d="M1090 535 L1180 167"/>
  <path class="edge" d="M1520 167 L1520 245"/>

  <path class="edge" d="M180 485 L120 520"/>
  <path class="edge" d="M220 485 L260 520"/>

  <!-- Legend -->
  <rect x="1180" y="380" width="340" height="155" rx="12" ry="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="1200" y="410" class="box-title">Legend</text>
  <line x1="1200" y1="430" x2="1260" y2="430" class="edge"/>
  <text x="1270" y="434" class="legend">구성/호출 관계</text>
  <line x1="1200" y1="458" x2="1260" y2="458" class="edge-dashed"/>
  <text x="1270" y="462" class="legend">내부 구성 요소</text>
  <text x="1200" y="492" class="legend">App이 대부분 컴포넌트를 조립하고,</text>
  <text x="1200" y="512" class="legend">OracleConnectionManager를 공유해</text>
  <text x="1200" y="532" class="legend">collector/processing/etc Oracle 연결을 재사용</text>
</svg>
