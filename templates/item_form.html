{% extends "base.html" %}

{% block title %}{{ action }} Item — BareMgr{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white">
        <h5 class="mb-0">
          <i class="bi bi-{{ 'pencil' if action == 'Edit' else 'plus-circle' }} me-2"></i>{{ action }} Item
        </h5>
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name" required
                   value="{{ item.name if item else '' }}" placeholder="e.g. Hendrick's Gin">
          </div>

          <div class="mb-3">
            <label for="category" class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
            <select class="form-select" id="category" name="category" required>
              <option value="" disabled {% if not item %}selected{% endif %}>Select a category…</option>
              {% for cat in categories %}
                <option value="{{ cat }}" {% if item and item.category == cat %}selected{% endif %}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="quantity" class="form-label fw-semibold">Quantity <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="quantity" name="quantity" min="0" required
                     value="{{ item.quantity if item else 0 }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="unit" class="form-label fw-semibold">Unit</label>
              <input type="text" class="form-control" id="unit" name="unit"
                     value="{{ item.unit if item else '' }}" placeholder="e.g. bottle, can, litre">
            </div>
          </div>

          <div class="mb-4">
            <label for="price" class="form-label fw-semibold">Price ($)</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" class="form-control" id="price" name="price" min="0" step="0.01"
                     value="{{ '%.2f'|format(item.price) if item else '0.00' }}">
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>{{ action }} Item
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
