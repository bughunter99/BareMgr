<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BareMgr{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .low-stock { background-color: #fff3cd !important; }
    .table th { white-space: nowrap; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">
        <i class="bi bi-cup-straw me-2"></i>BareMgr
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="{{ url_for('index') }}">Inventory</a>
        <a class="nav-link btn btn-outline-light btn-sm ms-2 px-3" href="{{ url_for('add_item') }}">
          <i class="bi bi-plus-lg me-1"></i>Add Item
        </a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll('.delete-form').forEach(function(form) {
      form.addEventListener('submit', function(e) {
        var name = form.querySelector('[data-name]').dataset.name;
        if (!confirm('Delete ' + name + '?')) { e.preventDefault(); }
      });
    });
  </script>
</body>
</html>
