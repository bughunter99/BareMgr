node_id: node1
weight: 100

failover:
  backend: zmq
  heartbeat_interval: 1
  fail_after_missed_heartbeats: 2
  status_interval: 5
  zmq:
    port: 5555
    peers:
      - 127.0.0.1:5557
      - 127.0.0.1:5559
  db:
    dsn: user/password@192.168.1.100:1521/ORCL
    table: FAILOVER_NODES
    ensure_table: true
    columns:
      node_id: NODE_ID
      weight: WEIGHT
      status: STATUS
      last_seen: LAST_SEEN
      updated_at: UPDATED_AT
    command:
      table: FAILOVER_COMMANDS
      ensure_table: true
      poll_interval_sec: 1
      columns:
        command_id: COMMAND_ID
        node_id: NODE_ID
        command: COMMAND
        created_at: CREATED_AT
        processed_at: PROCESSED_AT

logging:
  log_base: logs/app_node1

oracle_client:
  lib_dir: ""
  config_dir: ""
  driver_name: BareMgr

oracle_connections:
  - alias: DB_MAIN
    tns: 192.168.1.100:1521/ORCL
    user: user
    password: password
    pool:
      enabled: false
      min: 2
      max: 10
      increment: 1
      threaded: true
      getmode: wait
  - alias: DB_TARGET
    tns: 192.168.1.101:1521/ORCL
    user: user
    password: password
    pool:
      enabled: false
      min: 1
      max: 5
      increment: 1
      threaded: true
      getmode: wait

sqlite_connections:
  - table: job1_results
    path: data/app1/replication/default.db
    ddl_file: ddl/table1.sql
  - table: job2_results
    path: data/app1/replication/analytics.db
    ddl_file: ddl/table2.sql
  - table: splunk_job1
    path: data/app1/replication/analytics.db
    ddl_file: ddl/table3.sql

object_sqlite_types:
  - type: AAA
    ddl_file: ddl/object_aaa.sql
  - type: BBB
    ddl_file: ddl/object_bbb.sql

object_sqlite_done_dir: data/app1/objects/done

replication:
  port: 5556
  chunk_rows: 1000
  send_hwm: 200
  recv_hwm: 200
  subscriber_queue_size: 200
  peers:
    - 127.0.0.1:5558
    - 127.0.0.1:5560

pipeline:
  business:
    enabled: true
    interval_sec: 300
    run_on_active_only: true
    worker_mode: thread
    workers: 20
    batch_min: 6000
    batch_max: 8000
    source_oracle:
      enabled: true
      db: DB_MAIN
      sql: SELECT id, updated_at, name, qty FROM inventory ORDER BY updated_at DESC
      limit: 8000
    input_limit_per_table: 500
    output_table: pipeline_generated_objects
    object_log:
      db_path: data/app1/pipeline/object_results.db
    current_oracle:
      enabled: false
      db: DB_MAIN
      sql: SELECT id, updated_at FROM inventory ORDER BY updated_at DESC
      limit: 1000
    oracle_pool:
      db: DB_MAIN
    worker_oracle_lookup:
      enabled: false
      sql: SELECT id, updated_at FROM inventory WHERE id = :lookup_key
      bind_key: lookup_key
      object_field: batch_index
      limit: 1
    oracle_write:
      enabled: false
      dry_run: true
      db: DB_MAIN
      table: PIPELINE_RESULTS
      ensure_table: true

etc:
  enabled: true
  interval_sec: 60
  run_on_active_only: true
  workers: 1
  db: DB_MAIN
  sqlite_log:
    db_path: data/app1/pipeline/etc_runs.db
  tasks:
    - name: etc-heartbeat
      type: sqlite_heartbeat
      enabled: true
      interval_sec: 60
      table: etc_heartbeat
    - name: purge-object-results
      type: sqlite_purge_table
      enabled: true
      interval_sec: 300
      table: object_results
      retention_minutes: 1440
    - name: oracle-probe
      type: oracle_probe
      enabled: false
      interval_sec: 300

drone:
  enabled: false
  dry_run: true
  url: http://drone.local/api/messages
  timeout_sec: 5
  auth_token: ""
  headers: {}

syncmanager:
  enabled: false
  interval_sec: 600
  run_on_active_only: true
  workers: 1
  mode: incremental
  dry_run: true
  source_db: DB_MAIN
  target_db: DB_TARGET
  tables:
    - INVENTORY
    - ORDERS
    - AUDIT_EVENTS
  key_column: ID
  timestamp_column: UPDATED_AT
  batch_size: 500
  ensure_table: false
  checkpoint_db: data/app1/pipeline/sync_checkpoint.db

collectors:
  oracle:
    enabled: true
    db: DB_MAIN
    interval_sec: 60
    test:
      enabled: true
      emit_once: false

splunk:
  enabled: false
  host: splunk.internal
  port: 8089
  username: admin
  password: changeme
  scheme: https
  interval_sec: 120
  test:
    enabled: false
    emit_once: false
