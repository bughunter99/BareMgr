node_id: node1
weight: 100

failover:
  port: 5555
  heartbeat_interval: 1
  fail_after_missed_heartbeats: 2
  status_interval: 5
  peers:
    - 127.0.0.1:5557
    - 127.0.0.1:5559

logging:
  log_base: logs/app_node1

sqlite:
  path: data/node1.db

replication:
  port: 5556
  peers:
    - 127.0.0.1:5558
    - 127.0.0.1:5560

collectors:
  oracle:
    enabled: true
    dsn: user/password@192.168.1.100:1521/ORCL
    interval_sec: 60
    test:
      enabled: true
      rows: 5000
      emit_once: false
    jobs:
      - name: inventory
        sql: SELECT id, name, qty, updated_at FROM inventory WHERE updated_at > :last_ts
        table: inventory
      - name: orders
        sql: SELECT order_id, status, amount, created_at FROM orders WHERE created_at > :last_ts
        table: orders

  splunk:
    enabled: false
    host: splunk.internal
    port: 8089
    username: admin
    password: changeme
    scheme: https
    interval_sec: 120
    jobs:
      - name: error_events
        query: search index=main level=ERROR earliest=-2m latest=now | table _time, host, message
        table: splunk_errors
      - name: access_logs
        query: search index=access earliest=-2m latest=now | table _time, src_ip, uri, status
        table: splunk_access
