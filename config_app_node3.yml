node_id: node3
weight: 80

failover:
  backend: zmq
  port: 5559
  heartbeat_interval: 1
  fail_after_missed_heartbeats: 2
  status_interval: 5
  peers:
    - 127.0.0.1:5555
    - 127.0.0.1:5557
  db:
    dsn: user/password@192.168.1.100:1521/ORCL
    table: FAILOVER_NODES
    ensure_table: true
    columns:
      node_id: NODE_ID
      weight: WEIGHT
      status: STATUS
      last_seen: LAST_SEEN
      updated_at: UPDATED_AT
    command:
      table: FAILOVER_COMMANDS
      ensure_table: true
      poll_interval_sec: 1
      columns:
        command_id: COMMAND_ID
        node_id: NODE_ID
        command: COMMAND
        created_at: CREATED_AT
        processed_at: PROCESSED_AT

logging:
  log_base: logs/app_node3

sqlite:
  path: data/app3

oracle_client:
  lib_dir: ""
  config_dir: ""
  driver_name: BareMgr

replication:
  port: 5560
  chunk_rows: 1000
  send_hwm: 200
  recv_hwm: 200
  subscriber_queue_size: 200
  peers:
    - 127.0.0.1:5556
    - 127.0.0.1:5558

pipeline:
  processing:
    enabled: true
    interval_sec: 300
    run_on_active_only: true
    worker_mode: thread
    workers: 20
    batch_min: 6000
    batch_max: 8000
    source_oracle:
      enabled: true
      dsn: user/password@192.168.1.100:1521/ORCL
      sql: SELECT id, updated_at, name, qty FROM inventory ORDER BY updated_at DESC
      limit: 8000
    input_limit_per_table: 500
    output_table: pipeline_generated_objects
    object_log:
      db_path: data/app3/pipeline/object_results.db
    drone:
      enabled: false
      dry_run: true
      url: http://drone.local/api/messages
      timeout_sec: 5
      auth_token: ""
      headers: {}
    current_oracle:
      enabled: false
      dsn: user/password@192.168.1.100:1521/ORCL
      sql: SELECT id, updated_at FROM inventory ORDER BY updated_at DESC
      limit: 1000
    oracle_pool:
      enabled: false
      user: user
      password: password
      dsn: 192.168.1.100:1521/ORCL
      min: 2
      max: 10
      increment: 1
      threaded: true
      getmode: wait
    worker_oracle_lookup:
      enabled: false
      sql: SELECT id, updated_at FROM inventory WHERE id = :lookup_key
      bind_key: lookup_key
      object_field: batch_index
      limit: 1
    oracle_write:
      enabled: false
      dry_run: true
      dsn: user/password@192.168.1.100:1521/ORCL
      table: PIPELINE_RESULTS
      ensure_table: true
  sync:
    enabled: false
    interval_sec: 600
    run_on_active_only: true
    workers: 1
    mode: incremental
    dry_run: true
    source_dsn: user/password@192.168.1.100:1521/ORCL
    target_dsn: user/password@192.168.1.101:1521/ORCL
    tables:
      - INVENTORY
      - ORDERS
      - AUDIT_EVENTS
    key_column: ID
    timestamp_column: UPDATED_AT
    batch_size: 500
    ensure_table: false
    checkpoint_db: data/app3/pipeline/sync_checkpoint.db
  etc:
    enabled: true
    interval_sec: 60
    run_on_active_only: true
    workers: 1
    sqlite_log:
      db_path: data/app3/pipeline/etc_runs.db
    oracle:
      dsn: user/password@192.168.1.100:1521/ORCL
    tasks:
      - name: etc-heartbeat
        type: sqlite_heartbeat
        enabled: true
        interval_sec: 60
        table: etc_heartbeat
      - name: purge-object-results
        type: sqlite_purge_table
        enabled: true
        interval_sec: 300
        table: object_results
        retention_minutes: 1440
      - name: oracle-probe
        type: oracle_probe
        enabled: false
        interval_sec: 300

collectors:
  oracle:
    enabled: true
    dsn: user/password@192.168.1.100:1521/ORCL
    interval_sec: 60
    test:
      enabled: true
      rows: 5000
      emit_once: false
    jobs:
      - name: query1
        sql: SELECT id, name, qty, updated_at FROM inventory WHERE updated_at > :last_ts
        table: inventory
        test_rows: 5000
      - name: query2
        sql: SELECT order_id, status, amount, created_at FROM orders WHERE created_at > :last_ts
        table: orders
        test_rows: 3000
      - name: query3
        sql: SELECT event_id, event_type, source, created_at FROM audit_events WHERE created_at > :last_ts
        table: audit_events
        test_rows: 10000

  splunk:
    enabled: false
    host: splunk.internal
    port: 8089
    username: admin
    password: changeme
    scheme: https
    interval_sec: 120
    test:
      enabled: false
      rows: 10000
      emit_once: false
    jobs:
      - name: error_events
        query: search index=main level=ERROR earliest=-2m latest=now | table _time, host, message
        table: splunk_errors
        test_rows: 10000
      - name: access_logs
        query: search index=access earliest=-2m latest=now | table _time, src_ip, uri, status
        table: splunk_access
        test_rows: 10000
